<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pattern Coloring Generator</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <h2 class="sidebar-title">Settings</h2>
      <div class="sidebar-content">
        <div class="settings-group" data-group="page">
          <h3 class="group-header">
            <span class="arrow">▾</span>
            Page
          </h3>
          <div class="group-body">
          <div class="radio-group">
            <label class="control-label">Preset</label>
            <div class="radio-row">
              <label><input type="radio" name="pagePreset" value="a4" checked /> A4</label>
              <label><input type="radio" name="pagePreset" value="a5" /> A5</label>
              <label><input type="radio" name="pagePreset" value="manual" /> Manual</label>
            </div>
          </div>
        
          <div class="control">
            <label class="control-label" for="canvasWidth">Width</label>
            <div class="control-row">
              <input id="canvasWidth" type="number" min="100" max="5000" value="800" />
              <span class="unit-label">px</span>
            </div>
          </div>

          <div class="control">
            <label class="control-label" for="canvasHeight">Height</label>
            <div class="control-row">
              <input id="canvasHeight" type="number" min="100" max="5000" value="600" />
              <span class="unit-label">px</span>
            </div>
          </div>

        <div class="radio-group">
            <label class="control-label">Orientation</label>
            <div class="radio-row">
              <label><input type="radio" name="orientation" value="horizontal" checked /> Horizontal</label>
              <label><input type="radio" name="orientation" value="vertical" /> Vertical</label>
            </div>
          </div>
          </div>
        </div>

        <div class="settings-group" data-group="layers">
          <h3 class="group-header">
            <span class="arrow">▾</span>
            Layers
          </h3>
          <div class="group-body">
            <div id="layersList" class="layers-list"></div>
            <button id="addLayer" class="reset-button" type="button">
              Add Layer
            </button>
          </div>
        </div>

        <div class="settings-group" data-group="element">
          <h3 class="group-header">
            <span class="arrow">▾</span>
            Element
          </h3>
          <div class="group-body">
          <div class="radio-group">
            <label class="control-label">Type</label>
            <div class="radio-row">
              <label><input type="radio" name="shapeType" value="circle" checked /> Circle</label>
              <label><input type="radio" name="shapeType" value="square" /> Square</label>
            </div>
          </div>

        <div class="control">
          <label class="control-label" for="sizeRange">Size</label>
          <div class="control-row">
            <input id="sizeRange" type="range" min="1" max="200" value="30" />
            <input id="sizeNumber" type="number" min="1" max="200" value="30" />
            <span class="unit-label">px</span>
          </div>
        </div>

        <div class="control">
          <label class="control-label" for="gapXRange">Gap X</label>
          <div class="control-row">
            <input id="gapXRange" type="range" min="0" max="200" value="80" />
            <input id="gapXNumber" type="number" min="-500" max="200" value="80" />
            <span class="unit-label">px</span>
          </div>
        </div>

        <div class="control">
          <label class="control-label" for="gapYRange">Gap Y</label>
          <div class="control-row">
            <input id="gapYRange" type="range" min="0" max="200" value="80" />
            <input id="gapYNumber" type="number" min="-500" max="200" value="80" />
            <span class="unit-label">px</span>
          </div>
        </div>

        <div class="control">
          <label class="control-label" for="weightRange">Weight</label>
          <div class="control-row">
            <input id="weightRange" type="range" min="1" max="10" value="2" />
            <input id="weightNumber" type="number" min="1" max="10" value="2" />
            <span class="unit-label">px</span>
          </div>
        </div>

        <div class="control">
          <label class="control-label" for="strokeColor">Color</label>
          <div class="control-row">
            <input id="strokeColor" type="color" value="#000000" />
            <!-- <input id="strokeColorHex" type="text" value="#000000" /> -->
          </div>
        </div>

        <div class="control">
          <label class="control-label" for="shapeRotationRange">Shape Rotation</label>
          <div class="control-row">
            <input id="shapeRotationRange" type="range" min="-360" max="360" value="0" />
            <input id="shapeRotationNumber" type="number" min="-360" max="360" value="0" />
            <span class="unit-label">°</span>
          </div>
        </div>
          </div>
        </div>

        <div class="settings-group" data-group="pattern">
          <h3 class="group-header">
            <span class="arrow">▾</span>
            Pattern
          </h3>
          <div class="group-body">
          <div class="radio-group">
            <label class="control-label">Alignment</label>
            <div class="radio-row">
              <label><input type="radio" name="alignment" value="top-left" checked /> Top-Left</label>
              <label><input type="radio" name="alignment" value="center" /> Center</label>
            </div>
          </div>
        <div class="radio-group">
          <label class="control-label">Layout</label>
          <div class="radio-row">
            <label><input type="radio" name="layout" value="grid" checked /> Grid</label>
            <label><input type="radio" name="layout" value="brick" /> Brick</label>
          </div>
        </div>

        <div class="control">
          <label class="control-label" for="patternRotationRange">Pattern Rotation</label>
          <div class="control-row">
            <input id="patternRotationRange" type="range" min="-360" max="360" value="0" />
            <input id="patternRotationNumber" type="number" min="-360" max="360" value="0" />
            <span class="unit-label">°</span>
          </div>
        </div>
          </div>
        </div>

        <div class="sidebar-spacer"></div>
      </div>
      <div class="sidebar-footer">
        <button id="resetDefaults" class="reset-button" type="button">
          Reset to Defaults
        </button>
        <button id="downloadImage" class="primary-button" type="button">
          Download Image (PNG)
        </button>
      </div>
    </aside>

    <div class="workspace">
      <div id="canvasContainer">
        <div class="canvas-frame">
          <div class="dimension vertical">
            <span class="line"></span>
            <span id="heightLabel">0 px</span>
          </div>
          <div class="dimension horizontal">
            <span class="line"></span>
            <span id="widthLabel">0 px</span>
          </div>
          <canvas id="mainCanvas" width="800" height="600"></canvas>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>

</html>
